name: Hackathon AI Stack
version: 0.0.1
schema: v1

models:
  - name: DeepSeek - Default / Cheap
    provider: openrouter
    model: deepseek/deepseek-chat
    apiBase: https://openrouter.ai/api/v1
    apiKey: <Your API Key>
    roles:
      - chat
      - edit
      - apply

  - name: Qwen Coder - Free Fallback
    provider: openrouter
    model: qwen/qwen3-coder:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: <Your API Key>
    roles:
      - chat
      - edit
      - apply

  - name: Claude Sonnet - Premium
    provider: openrouter
    model: anthropic/claude-sonnet-4.5
    apiBase: https://openrouter.ai/api/v1
    apiKey: <Your API Key>
    roles:
      - chat
      - edit
      - apply